name: Publish to npm

# Triggered on a tag push (e.g. v0.1.0). Uses npm Trusted Publishing
# (OIDC) — no NPM_TOKEN required after the npm-side publisher is
# configured. Falls back to NPM_TOKEN if Trusted Publishing isn't set up.
#
# One-time npm setup:
#   1. Publish the first version manually with `npm publish` (creates the
#      package on the registry — Trusted Publishing requires the package
#      to exist first).
#   2. Visit https://www.npmjs.com/package/falsify-js/access
#   3. "Trusted Publishers" → Add → GitHub Actions
#      Owner:        studio-11-co
#      Repository:   falsify-js
#      Workflow:     publish.yml
#      Environment:  npm
#   4. Subsequent releases: `git tag v0.1.1 && git push origin v0.1.1` →
#      this workflow publishes via OIDC, no token needed.

# DECISION (2026-06-02): npm Trusted Publishing (OIDC) is NOT used for this
# package. Multiple attempts hit ENEEDAUTH at the registry PUT despite valid
# OIDC/provenance signing. Releases are rare, so the chosen method is a quick
# MANUAL publish from a local terminal:
#     npm login --auth-type=web      # browser auth, tap the security key
#     npm publish                    # run in an interactive terminal
# (Security-key 2FA needs an interactive TTY; CI cannot complete it.)
# This workflow is left as manual-only (workflow_dispatch) and is not wired to
# tags. Do not re-enable OIDC without first fixing the npm-side publisher.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC trust to npm

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fetch v0.1 conformance vectors
        run: |
          mkdir -p ../falsify-hackathon/spec/test-vectors/v0.1
          curl -sL "https://raw.githubusercontent.com/studio-11-co/falsify/main/spec/test-vectors/v0.1/test-vectors.json" \
            -o ../falsify-hackathon/spec/test-vectors/v0.1/test-vectors.json
      - name: Run tests before publish
        run: node test.js

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/falsify-js
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Upgrade npm to ≥ 11.5 for Trusted Publishing OIDC support
        run: sudo npm install -g npm@latest
      - name: Verify version matches tag (skip on manual workflow_dispatch)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: Strip any setup-node-injected placeholder NODE_AUTH_TOKEN entries from .npmrc
        run: |
          # If actions/setup-node wrote a .npmrc with a placeholder token reference,
          # remove it so npm CLI falls back to OIDC.
          if [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            sed -i '/_authToken=/d' "$NPM_CONFIG_USERCONFIG" || true
            cat "$NPM_CONFIG_USERCONFIG" 2>/dev/null || true
          fi
      - name: Publish to npm (Trusted Publishing — OIDC)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ""
